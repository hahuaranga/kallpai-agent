apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kallpai-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kallpai-agent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kallpai-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kallpai-agent.selectorLabels" . | nindent 8 }}
      annotations:
        # Fuerza rollout cuando cambia el secret
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      containers:
        - name: fastapi
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kallpai-agent.fullname" . }}-secrets
                  key: OPENAI_API_KEY
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kallpai-agent.fullname" . }}-secrets
                  key: ANTHROPIC_API_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "kallpai-agent.fullname" . }}-secrets
                  key: DATABASE_URL
            - name: EMBEDDING_MODEL
              value: {{ .Values.rag.embeddingModel | quote }}
            - name: LLM_MODEL
              value: {{ .Values.rag.llmModel | quote }}
            - name: CHUNK_SIZE
              value: {{ .Values.rag.chunkSize | quote }}
            - name: CHUNK_OVERLAP
              value: {{ .Values.rag.chunkOverlap | quote }}
            - name: RETRIEVAL_K
              value: {{ .Values.rag.retrievalK | quote }}
            - name: CORS_ORIGINS
              value: {{ .Values.cors.origins | join "," | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}